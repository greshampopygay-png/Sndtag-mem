<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sound Tag</title>

<style>
body{
    background:black;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
    margin:0;
    font-family:Arial;
}

img{
    width:250px;
    border-radius:20px;
    cursor:pointer;
    transition:0.2s;
}

img:hover{
    transform:scale(1.05);
}
</style>
</head>
<body>

<h1>Нажми 😈</h1>

<img id="btn" src="https://i.imgur.com/8Km9tLL.png">

<audio id="audio" loop>
    <source src="sound.mp3" type="audio/mpeg">
</audio>

<script>
const btn = document.getElementById("btn");
const audio = document.getElementById("audio");

let playing = false;

btn.onclick = () => {

    if(!playing){
        audio.play();
        playing = true;
    }else{
        audio.pause();
        audio.currentTime = 0;
        playing = false;
    }

};
</script>

</body>
</html>
