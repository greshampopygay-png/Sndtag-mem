<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sound Tag</title>

<style>
    body{
        margin:0;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        flex-direction:column;
        background:black;
        overflow:hidden;
        font-family:Arial;
        color:white;
    }

    img{
        width:250px;
        cursor:pointer;
        transition:0.2s;
        border-radius:20px;
    }

    img:hover{
        transform:scale(1.05);
    }

    h1{
        margin-bottom:20px;
    }

    .flash{
        animation:flash 0.2s infinite;
    }

    @keyframes flash{
        0%{background:black;}
        50%{background:red;}
        100%{background:black;}
    }
</style>
</head>
<body>

<h1>Нажми на картинку 😈</h1>

<img id="soundBtn"
src="https://i.imgur.com/8Km9tLL.png">

<audio id="sound" loop>
    <source src="sound.mp3" type="audio/mpeg">
</audio>

<script>
const btn = document.getElementById("soundBtn");
const sound = document.getElementById("sound");

let playing = false;

btn.onclick = async () => {

    if(!playing){
        sound.play();
        document.body.classList.add("flash");
        playing = true;
    }else{
        sound.pause();
        sound.currentTime = 0;
        document.body.classList.remove("flash");
        playing = false;
    }

};

// Остановить звук при закрытии вкладки
window.addEventListener("beforeunload", () => {
    sound.pause();
    sound.currentTime = 0;
});
</script>

</body>
</html>
